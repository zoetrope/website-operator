apiVersion: website.zoetrope.github.io/v1beta1
kind: WebSite
metadata:
  name: honkit-sample
  namespace: default
spec:
  buildImage: ghcr.io/zoetrope/node:18.12.1
  buildScript:
    configMap:
      name: build-scripts
      key: build-honkit.sh
  repoURL: https://github.com/zoetrope/honkit-sample.git
  branch: main
  publicURL: http://localhost:9090
  nginxContainerResources:
    requests:
      memory: "100Mi"
      cpu: "10m"
  repoCheckerContainerResources:
    requests:
      memory: "100Mi"
      cpu: "10m"
